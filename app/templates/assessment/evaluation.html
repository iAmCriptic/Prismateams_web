{% extends "base.html" %}
{% from "assessment/_macros.html" import assessment_page_header %}
{% block title %}Bewertung abgeben{% endblock %}
{% block content %}
{{ assessment_page_header('Bewertung abgeben', icon='clipboard-check') }}
    <div class="card">
        <div class="card-body">
            <div class="mb-3">
                <label class="form-label">Bewertungsliste</label>
                <select class="form-select" id="listSelect">
                    {% for lst in evaluation_lists %}
                    <option value="{{ lst.id }}">{{ lst.name }}{% if lst.welcome_label %} – {{ lst.welcome_label }}{% endif %}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label" id="targetLabel">Bewertungsziel</label>
                <select class="form-select" id="target"></select>
            </div>
            <div id="criteria" class="row g-2"></div>
            <button class="btn btn-accent mt-3" onclick="submitEval()">Speichern</button>
            <p class="text-muted mt-2 mb-0" id="status"></p>
        </div>
    </div>
<script>
let criteria = [];
let currentList = null;

function escapeHtml(str) { return String(str ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function loadData() {
    const listId = document.getElementById('listSelect').value;
    const res = await fetch(`/assessment/api/evaluate?list_id=${listId}`);
    const data = await res.json();
    if (!data.success) {
        document.getElementById('status').textContent = data.message || 'Fehler beim Laden';
        return;
    }
    currentList = data.list;
    const isStand = currentList.subject_mode === 'stand';
    document.getElementById('targetLabel').textContent = isStand ? 'Stand' : 'Bewertungsziel';
    const targets = isStand ? (data.stands || []) : (data.subjects || []);
    document.getElementById('target').innerHTML = targets.map(t => {
        const extra = isStand && t.stand_type_name ? ` (${t.stand_type_name})` : '';
        return `<option value="${t.id}">${escapeHtml(t.name)}${escapeHtml(extra)}</option>`;
    }).join('');
    criteria = data.criteria || [];
    document.getElementById('criteria').innerHTML = criteria.map(c => `
        <div class="col-md-6">
            <label class="form-label">${escapeHtml(c.name)} (0-${c.max_score})</label>
            <input class="form-control" id="criterion_${c.id}" type="number" min="0" max="${c.max_score}" value="0">
        </div>
    `).join('');
    document.getElementById('status').textContent = '';
}

async function submitEval() {
    const scores = {};
    criteria.forEach(c => scores[c.id] = Number(document.getElementById(`criterion_${c.id}`).value || 0));
    const payload = { list_id: Number(document.getElementById('listSelect').value), scores };
    if (currentList.subject_mode === 'stand') {
        payload.stand_id = Number(document.getElementById('target').value);
    } else {
        payload.subject_id = Number(document.getElementById('target').value);
    }
    const res = await fetch('/assessment/api/evaluate', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
    const data = await res.json();
    document.getElementById('status').textContent = data.message || (data.success ? 'Gespeichert' : 'Fehler');
}

document.getElementById('listSelect').addEventListener('change', loadData);
loadData();
</script>
{% endblock %}
