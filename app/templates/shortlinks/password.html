<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Passwort erforderlich</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Inter, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .pw-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
        }
        .pw-card {
            width: 100%;
            max-width: 440px;
            border: 0;
            border-radius: 1rem;
            box-shadow: 0 18px 45px rgba(20, 24, 50, 0.35);
            backdrop-filter: blur(1px);
        }
        .pw-title {
            font-weight: 700;
            letter-spacing: 0.2px;
        }
        .pw-note {
            background: #f4f7ff;
            border: 1px solid #dbe5ff;
            color: #304a7b;
            border-radius: 0.75rem;
            padding: 0.8rem 1rem;
            font-size: 0.96rem;
            margin-bottom: 1rem;
        }
        .form-control {
            border-radius: 0.75rem;
            padding: 0.78rem 0.95rem;
            border: 1px solid #cfd7ea;
        }
        .form-control:focus {
            border-color: #7a84ff;
            box-shadow: 0 0 0 0.22rem rgba(122, 132, 255, 0.2);
        }
        .btn-primary {
            border-radius: 0.75rem;
            padding: 0.78rem 1rem;
            font-weight: 600;
            border: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .btn-primary:hover {
            filter: brightness(1.03);
        }
    </style>
</head>
<body>
<div class="pw-wrap">
    <div class="card pw-card">
        <div class="card-body p-4 p-md-5">
            <h1 class="h4 pw-title mb-3">Passwort erforderlich</h1>
            <p class="pw-note mb-3">Dieser Link ist passwortgeschützt.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label for="password" class="form-label">Passwort</label>
                    <input type="password" class="form-control" id="password" name="password" required autofocus>
                </div>
                <button type="submit" class="btn btn-primary w-100">Weiter</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
