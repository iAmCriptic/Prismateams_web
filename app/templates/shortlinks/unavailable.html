<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kurzlink nicht verfügbar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Inter, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .unavailable-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
        }
        .unavailable-card {
            width: 100%;
            max-width: 520px;
            border: 0;
            border-radius: 1rem;
            box-shadow: 0 18px 45px rgba(20, 24, 50, 0.35);
        }
        .unavailable-icon {
            width: 68px;
            height: 68px;
            margin: 0 auto 1rem;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: #fff2f2;
            color: #c53939;
            font-size: 1.8rem;
        }
        .unavailable-title {
            font-weight: 700;
            letter-spacing: 0.2px;
        }
        .unavailable-note {
            background: #f8f9ff;
            border: 1px solid #e0e6ff;
            color: #3d4870;
            border-radius: 0.75rem;
            padding: 0.9rem 1rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
<div class="unavailable-wrap">
    <div class="card unavailable-card">
        <div class="card-body p-4 p-md-5 text-center">
            <div class="unavailable-icon">
                <span>!</span>
            </div>
            <h1 class="h4 unavailable-title mb-3">Kurzlink nicht verfügbar</h1>
            <p class="unavailable-note">Der Link ist ungültig, deaktiviert oder abgelaufen.</p>
            <p class="text-muted mb-0">Bitte prüfe die Adresse oder frage den Link-Ersteller nach einem neuen Kurzlink.</p>
        </div>
    </div>
</div>
</body>
</html>
